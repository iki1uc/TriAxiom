<!DOCTYPE html>
<html>
<head>
    <title>TriAxiom – Drei Grundsätze</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #0f0;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .axioms {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .axiom {
            background: #111;
            border: 1px solid #333;
            padding: 25px;
            border-radius: 8px;
            font-size: 18px;
        }

        .axiom-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 22px;
            color: #0f0;
        }
    </style>
</head>
<body>

<h1>TriAxiom – Drei Grundgesetze</h1>

<div class="axioms">
    <div class="axiom">
        <div class="axiom-title">Axiom I</div>
        Struktur erzeugt Ordnung.
    </div>

    <div class="axiom">
        <div class="axiom-title">Axiom II</div>
        Ordnung erzeugt Bewegung.
    </div>

    <div class="axiom">
        <div class="axiom-title">Axiom III</div>
        Bewegung erzeugt System.
    </div>
</div>

</body>
</html>
